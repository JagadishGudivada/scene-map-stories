<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sarevista — Filming Locations Map for Movies, Series & Books</title>
    <meta name="description" content="Discover, save, and share real filming locations from your favourite movies, series, and books. Cinema meets travel — your memory map." />
    <meta name="author" content="Sarevista" />

    <meta property="og:title" content="Sarevista — Your Cinema Memory Map" />
    <meta property="og:description" content="Discover filming locations from your favourite titles. Map the places that made those scenes unforgettable." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sarevista" />
    <meta property="og:url" content="https://sarevista.com/" />
    <meta property="og:image" content="https://sarevista.com/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Sarevista" />
    <meta name="twitter:image" content="https://sarevista.com/opengraph-image-p98pqg.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Sarevista",
        "url": "https://sarevista.com/",
        "description": "Discover filming locations from your favourite movies, series, and books.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://sarevista.com/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Sarevista",
        "url": "https://sarevista.com/",
        "logo": "https://sarevista.com/opengraph-image-p98pqg.png",
        "sameAs": [
          "https://instagram.com",
          "https://twitter.com",
          "https://youtube.com"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
