    <meta property="og:title" content="Sarevista — Your Screen-Location Memory Map" />

    <script type="application/ld+json">

          "target": "https://sarevista.com/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
